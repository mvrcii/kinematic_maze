<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div id="titlebar">
        <div id="tab-controls">
            <button class="tab-link" onclick="openTab(event, 'animation')">Animation</button>
            <button class="tab-link" onclick="openTab(event, 'graphs')">Graph</button>
        </div>
        <div>
            <h1 id="heading">VR Dashboard</h1>
        </div>
<!--        <div id="upload-button">-->
<!--            <input type="file" id="csvFileInput" accept=".csv" style="display: none;"/>-->
<!--            <label for="csvFileInput" class="fa fa-file-csv fa-fade" aria-hidden="true"></label>-->
<!--        </div>-->

    </div>

    <div id="main-container">
        <div id="graphs" class="tab-content">
            <!-- Graphs will be injected here -->
        </div>

        <div id="animation" class="tab-content">
            <ul id="csvFileList">
                <li><a href="#" data-csv="data/lukas.csv">CSV File 1</a></li>
                <li><a href="#" data-csv="data/lukas.bsor.csv">CSV File 2</a></li>
                <!-- more list items for each CSV file -->
            </ul>
        </div>
    </div>
</div>
<script type="module" src="bundle.js"></script>
<script>
    // JavaScript function to switch tabs
    function openTab(evt, tabName) {
        let i, tabContent, tabLinks;
        tabContent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabContent.length; i++) {
            tabContent[i].style.display = "none";
        }
        tabLinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tabLinks.length; i++) {
            tabLinks[i].className = tabLinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "flex";
        evt.currentTarget.className += " active";
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelector(".tab-link").click();
    });
</script>
</body>
</html>
