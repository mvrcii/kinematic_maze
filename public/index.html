  <script>
    function getQueryVariable(variable) {
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i=0;i<vars.length;i++) {
            const pair = vars[i].split("=");
            if (pair[0] == variable) {
            return pair[1];
            }
        }
    }



    document.addEventListener('DOMContentLoaded', () => {
        
      player1 = MotionVisualization("samples/" + getQueryVariable("foo") + "/original.csv", "threeCanvas1");
      player2 = MotionVisualization("samples/" + getQueryVariable("foo") + "/fixed.csv", "threeCanvas2");
    });
